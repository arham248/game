<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cloud Balance Game</title>

<style>
*{box-sizing:border-box;font-family:Arial,sans-serif}
body{
  margin:0;
  min-height:100vh;
  background:linear-gradient(135deg,#74ebd5,#acb6e5);
  padding:18px;
  color:#10233f;
}
.app{max-width:1100px;margin:auto}
header{text-align:center;color:white;margin-bottom:15px}
h1{margin:0;font-size:36px;text-shadow:0 4px 12px #0004}
.subtitle{font-size:16px;margin-top:6px}

.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  margin-bottom:18px;
}
.card{
  background:white;
  border-radius:20px;
  padding:14px;
  text-align:center;
  box-shadow:0 8px 20px #0002;
}
.card span{display:block;color:#567;font-size:13px}
.card b{font-size:25px;color:#1565c0}

.game{
  display:grid;
  grid-template-columns:1fr 2fr;
  gap:18px;
}
.panel{
  background:white;
  border-radius:25px;
  padding:18px;
  box-shadow:0 10px 25px #0002;
}
h2{margin-top:0;color:#0d47a1}

.tasks,.serverTasks{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  min-height:90px;
}
.task{
  width:72px;
  height:58px;
  background:linear-gradient(145deg,#ff9800,#ff5722);
  color:white;
  border-radius:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  cursor:grab;
  box-shadow:0 7px 0 #c43d12;
  animation:bounce .9s infinite alternate;
}
.task:active{transform:scale(.92)}
@keyframes bounce{
  from{transform:translateY(0)}
  to{transform:translateY(-5px)}
}

.servers{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
}
.server{
  background:#f3fff4;
  border:4px solid #2ecc71;
  border-radius:22px;
  padding:14px;
  min-height:180px;
  transition:.2s;
}
.server.over{background:#ffecec;border-color:#e53935;animation:shake .3s infinite}
.server.empty{background:#f4f4f4;border-color:#aaa}
@keyframes shake{
  0%{transform:rotate(0)}
  25%{transform:rotate(1deg)}
  50%{transform:rotate(-1deg)}
  100%{transform:rotate(0)}
}
.server h3{margin:0 0 8px;color:#0d47a1}
.bar{
  height:18px;
  background:#ddd;
  border-radius:20px;
  overflow:hidden;
  margin-bottom:10px;
}
.fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00c853,#ffd600);
}
.server.over .fill{background:#e53935}

button{
  border:0;
  padding:12px 16px;
  border-radius:18px;
  font-weight:bold;
  cursor:pointer;
  margin:6px 5px 0 0;
  color:white;
  box-shadow:0 6px 0 #0003;
}
button:active{transform:translateY(4px);box-shadow:0 2px 0 #0003}
.green{background:#2ecc71}
.blue{background:#1565c0}
.red{background:#e53935}

.msg{
  margin-top:14px;
  background:#e3f2fd;
  padding:12px;
  border-radius:16px;
  font-weight:bold;
}

@media(max-width:800px){
  .game,.stats{grid-template-columns:1fr}
  .servers{grid-template-columns:1fr}
}
</style>
</head>

<body>
<div class="app">
<header>
  <h1>Cloud Balance Game</h1>
  <div class="subtitle">Move tasks. Balance servers. Reduce cost.</div>
</header>

<div class="stats">
  <div class="card"><span>Success</span><b id="success">0%</b></div>
  <div class="card"><span>Delay</span><b id="delay">0ms</b></div>
  <div class="card"><span>Cost</span><b id="cost">0</b></div>
  <div class="card"><span>Score</span><b id="score">100</b></div>
</div>

<div class="game">
  <div class="panel">
    <h2>Incoming Tasks</h2>
    <div class="tasks" id="taskPool"></div>
    <button class="green" onclick="autoBalance()">Basic Auto Balance</button>
    <button class="blue" onclick="check()">Check</button>
    <button class="red" onclick="reset()">Reset</button>
    <div class="msg" id="msg">Drag tasks into servers. Keep them balanced!</div>
  </div>

  <div class="panel">
    <h2>Cloud Servers</h2>
    <div class="servers" id="servers"></div>
  </div>
</div>
</div>

<script>
const baseTasks=[
  {id:1,size:2},{id:2,size:3},{id:3,size:4},{id:4,size:2},
  {id:5,size:5},{id:6,size:3},{id:7,size:4},{id:8,size:2}
];

let tasks,servers;

function reset(){
  tasks=structuredClone(baseTasks);
  servers=[
    {id:1,name:"Server A",cap:8,tasks:[]},
    {id:2,name:"Server B",cap:8,tasks:[]},
    {id:3,name:"Server C",cap:8,tasks:[]},
    {id:4,name:"Server D",cap:8,tasks:[]}
  ];
  render();
  msg("Try to avoid overloaded and empty servers.");
}

function render(){
  const pool=document.getElementById("taskPool");
  pool.innerHTML="";
  tasks.forEach(t=>{
    const div=document.createElement("div");
    div.className="task";
    div.draggable=true;
    div.textContent="T"+t.id+"-"+t.size;
    div.ondragstart=e=>e.dataTransfer.setData("id",t.id);
    pool.appendChild(div);
  });

  const box=document.getElementById("servers");
  box.innerHTML="";
  servers.forEach(s=>{
    const load=s.tasks.reduce((a,t)=>a+t.size,0);
    const percent=Math.min((load/s.cap)*100,120);
    const div=document.createElement("div");
    div.className="server";
    if(load>s.cap)div.classList.add("over");
    if(load===0)div.classList.add("empty");

    div.ondragover=e=>e.preventDefault();
    div.ondrop=e=>move(Number(e.dataTransfer.getData("id")),s.id);

    div.innerHTML=`
      <h3>${s.name}</h3>
      <div class="bar"><div class="fill" style="width:${percent}%"></div></div>
      <b>Load: ${load}/${s.cap}</b>
      <div class="serverTasks"></div>
    `;

    const holder=div.querySelector(".serverTasks");
    s.tasks.forEach(t=>{
      const task=document.createElement("div");
      task.className="task";
      task.textContent="T"+t.id+"-"+t.size;
      task.onclick=()=>remove(t.id,s.id);
      holder.appendChild(task);
    });

    box.appendChild(div);
  });

  updateStats();
}

function move(taskId,serverId){
  const i=tasks.findIndex(t=>t.id===taskId);
  if(i<0)return;
  const task=tasks.splice(i,1)[0];
  servers.find(s=>s.id===serverId).tasks.push(task);
  render();
}

function remove(taskId,serverId){
  const s=servers.find(x=>x.id===serverId);
  const i=s.tasks.findIndex(t=>t.id===taskId);
  tasks.push(s.tasks.splice(i,1)[0]);
  render();
}

function autoBalance(){
  tasks=structuredClone(baseTasks);
  servers.forEach(s=>s.tasks=[]);

  const sorted=[...tasks].sort((a,b)=>b.size-a.size);
  tasks=[];

  sorted.forEach(task=>{
    let best=servers
      .filter(s=>load(s)+task.size<=s.cap)
      .sort((a,b)=>load(a)-load(b))[0];

    if(!best) best=servers.sort((a,b)=>load(a)-load(b))[0];
    best.tasks.push(task);
  });

  render();
  msg("Basic static optimization balanced the tasks.");
}

function load(s){
  return s.tasks.reduce((a,t)=>a+t.size,0);
}

function updateStats(){
  const placed=servers.reduce((a,s)=>a+s.tasks.length,0);
  const total=baseTasks.length;
  const overloaded=servers.filter(s=>load(s)>s.cap).length;
  const used=servers.filter(s=>load(s)>0).length;
  const emptyUsed=servers.filter(s=>load(s)===0).length;

  let success=placed===0?0:Math.round(((placed-overloaded)/total)*100);
  if(success<0)success=0;

  const delay=placed===0?0:Math.round(260 + overloaded*180 + used*20);
  const cost=used*100;

  let score=1000;
  score-=tasks.length*80;
  score-=overloaded*250;
  score-=cost*0.6;
  score-=delay*0.5;
  score=Math.max(0,Math.round(score));

  document.getElementById("success").textContent=success+"%";
  document.getElementById("delay").textContent=delay+"ms";
  document.getElementById("cost").textContent=cost;
  document.getElementById("score").textContent=score;
}

function check(){
  if(tasks.length>0)msg("Some tasks are still waiting.");
  else if(servers.some(s=>load(s)>s.cap))msg("Some servers are overloaded!");
  else msg("Great! Balanced servers and controlled cost.");
}

function msg(t){
  document.getElementById("msg").textContent=t;
}

reset();
</script>
</body>
</html>
